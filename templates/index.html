<!DOCTYPE html>
<html>
<head>
    <title>Options Board Trainer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="outer-wrapper">
<div class="left-content">

<!-- ================= ACTION BUTTONS + QUOTING WINDOW ================= -->

<div class="page-header main-page-header">
    <div class="action-buttons">
        <button onclick="makeRandomMarket()">Make a Random Market</button>
        <button onclick="generateRandomOrder()">Generate Random Order</button>
        <button onclick="makeMarket()">Make a Combo Market</button>
        <button onclick="generateOrder()">Generate Combo Order</button>
        <button onclick="makeAnyOptionsMarket()">Make an Options Market</button>
        <button onclick="generateAnyOptionsOrder()">Generate Options Order</button>
        <button onclick="makeOptionsMarket()">Make an ITM Options Market</button>
        <button onclick="generateOptionsOrder()">Generate ITM Options Order</button>
        <button onclick="makeMiddleOptionsMarket()">Make a Middle Options Market</button>
        <button onclick="generateMiddleOptionOrder()">Generate Middle Option Order</button>
        <button onclick="generateOtmOrder()">Generate OTM Order</button>
        <button onclick="makeRRMarket()">Quote RR</button>
        <button onclick="makeCSPSMarket()">Quote CS/PS</button>
        <button onclick="generateSpreadOrder()">Trade Spread</button>
        <button onclick="targetPractice()">Target Practice</button>
    </div>

    <div id="quoting-window" class="quoting-window quoting-window--idle">
        <div class="quoting-window-title" id="quoting-title">No active market</div>
        <div class="quoting-window-inputs" id="quoting-inputs" style="display:none;">
            <div class="quoting-row">
                <label class="quoting-label">Bid</label>
                <input id="bid-input" class="quoting-input" type="number" step="0.01" placeholder="0.00">
            </div>
            <div class="quoting-row">
                <label class="quoting-label">Offer</label>
                <input id="offer-input" class="quoting-input" type="number" step="0.01" placeholder="0.00">
            </div>
            <div class="quoting-row">
                <label class="quoting-label" title="Quote relative to this stock price; bid/offer are delta-adjusted to the current mid at submission">Ref S</label>
                <input id="ref-fair-input" class="quoting-input quoting-input--ref" type="number" step="0.01" placeholder="optional">
            </div>
            <div class="quoting-submit-row">
                <button class="quoting-submit-btn" onclick="submitMarket()">Submit</button>
                <span id="modal-timer" class="modal-timer"></span>
            </div>
        </div>
    </div>
</div>

<!-- ================= TAPE + ORDERS ================= -->

<div class="main-layout" style="margin-top:12px;">
    <div class="main-right" style="grid-column:1/-1;">

        <div class="below-board">

            <!-- tape -->
            <div class="tape-panel">
                <div class="tape-header">
                    <span class="tape-title">Trade Tape</span>
                    <div class="tape-btn-group">
                        <button class="tape-fair-btn" onclick="toggleFair()">Show / Hide Stock Fair</button>
                        <button class="tape-fair-btn" onclick="toggleImpliedStock()">Show / Hide Implied Stock</button>
                    </div>
                </div>
                <div id="fair-panel" class="fair-panel" style="display:none;"></div>
                <div id="tape-container" class="tape-container"></div>
            </div>

            <!-- resting orders -->
            <div class="orders-panel">
                <div class="orders-panel-title">Resting Orders</div>
                <div id="orders-container"></div>
            </div>

        </div>

    </div>
</div><!-- end main-layout -->

</div><!-- end left-content -->
</div><!-- end outer-wrapper -->

<!-- ================= JAVASCRIPT ================= -->

<script>

/* ================= GLOBAL STATE ================= */

let pendingMarket    = null;
let showImpliedStock = false;
const stockSize      = {{ stock_size }};
const stockRef       = {{ stock_ref }};
const boardStrikes   = {{ strikes | tojson }};
const tickSize       = boardStrikes.length >= 2
    ? Math.round((boardStrikes[1] - boardStrikes[0]) * 100) / 100
    : 5;

// Submit on Enter from bid/offer inputs
document.addEventListener("keydown", function(e) {
    if (e.key !== "Enter") return;
    const active = document.activeElement;
    if (active && (active.id === "bid-input" || active.id === "offer-input")) {
        submitMarket();
    }
});

// Read shared settings written by /starting_info
let audioMode    = localStorage.getItem('si_audioMode')    === 'true';
let decisionTime = parseFloat(localStorage.getItem('si_decisionTime')) || null;
let quoteTime    = parseFloat(localStorage.getItem('si_quoteTime'))    || null;

let modalTimerInterval = null;
let tradeCounter       = 0;
let nextOrderId        = 0;

// Registry of resting options orders per cell: option_label → [{side, price, size, orderId}]
const cellRestingOrders   = {};
// Registry of resting combo orders per strike: strikeKey → [{side, price, size, orderId}]
const comboRestingOrders  = {};
// Registry of resting spread orders per label: spread_label → [{side, price, size, orderId}]
const spreadRestingOrders = {};

// Strategy companion queue: [{strike, option_type, preferred_side}]
let strategyLegs = [];

function isOnBoard(s) {
    return boardStrikes.some(bs => Math.abs(bs - s) < 0.01);
}

function speakIfEnabled(text) {
    if (!audioMode || !text) return;
    fetch("/speak", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
    });
}

/* ================= MODAL TIMER ================= */

function startModalTimer() {
    if (!quoteTime) return;
    const timerSpan = document.getElementById("modal-timer");
    const qw        = document.getElementById("quoting-window");
    let remaining = quoteTime;
    timerSpan.textContent = `${remaining}s`;
    modalTimerInterval = setInterval(() => {
        remaining -= 1;
        timerSpan.textContent = `${remaining}s`;
        if (remaining <= 0) {
            clearInterval(modalTimerInterval);
            modalTimerInterval = null;
            timerSpan.textContent = "Time's up!";
            qw.classList.add("quoting-window--flashing");
        }
    }, 1000);
}

function clearModalTimer() {
    if (modalTimerInterval !== null) {
        clearInterval(modalTimerInterval);
        modalTimerInterval = null;
    }
    document.getElementById("modal-timer").textContent = "";
    document.getElementById("quoting-window").classList.remove("quoting-window--flashing");
}

/* ================= TRADE TAPE ================= */

function addTapeEntry(text, impliedStock) {
    const container = document.getElementById("tape-container");
    const entry     = document.createElement("div");
    entry.className = "tape-entry";

    const textSpan = document.createElement("span");
    textSpan.innerText = text;
    entry.appendChild(textSpan);

    if (impliedStock != null) {
        const isSpan = document.createElement("span");
        isSpan.className  = "tape-implied-stock";
        isSpan.innerText  = ` [Implied stock: ${parseFloat(impliedStock).toFixed(2)}]`;
        isSpan.style.display = showImpliedStock ? "inline" : "none";
        entry.appendChild(isSpan);
    }

    container.insertBefore(entry, container.firstChild);
}

function toggleImpliedStock() {
    showImpliedStock = !showImpliedStock;
    document.querySelectorAll(".tape-implied-stock").forEach(el => {
        el.style.display = showImpliedStock ? "inline" : "none";
    });
}

function toggleFair() {
    const panel = document.getElementById("fair-panel");
    if (panel.style.display === "none") {
        fetch("/board_params")
            .then(r => r.json())
            .then(p => {
                panel.innerHTML = [
                    `True stock fair (stock_num): ${p.stock_fair.toFixed(2)}`,
                    `Apparent stock fair (fair_mid): ${p.fair_mid.toFixed(2)}`,
                    `Initial fair: ${p.initial_fair.toFixed(2)}`,
                    `Starting size: ${p.starting_size}`,
                    `Impact function: ${p.impact_function.toFixed(4)}`,
                    `Rand factor: ${p.rand_factor.toFixed(4)}`,
                    `Initial width raw: ${p.start_width_raw.toFixed(6)}`,
                    `Initial width (rounded): ${p.start_width.toFixed(2)}`,
                    `r/c: ${p.rc.toFixed(2)}`,
                    `Initial bid / offer: ${p.initial_bid.toFixed(2)} / ${p.initial_offer.toFixed(2)}`,
                    `Initial sizes: ${p.starting_size} / ${p.starting_size}`,
                ].map(l => `<div>${l}</div>`).join("");
                panel.style.display = "block";
            });
    } else {
        panel.style.display = "none";
    }
}

/* ================= ORDER RENDERING ================= */

function isOpt(kind)    { return kind === "options" || kind === "middle_options"; }
function isSpread(kind) { return kind === "spread"; }

function renderOrder(order) {
    const container = document.getElementById("orders-container");
    const orderId   = (order._orderId !== undefined) ? order._orderId : nextOrderId++;

    if (isSpread(order.order_kind)) {
        const key   = order.spread_label;
        const price = parseFloat(order.price ?? order.customer_price);
        const side  = order.side;
        if (key && side && !isNaN(price)) {
            if (!spreadRestingOrders[key]) spreadRestingOrders[key] = [];
            spreadRestingOrders[key].push({ side, price, size: order.size, orderId });
        }
    } else if (!isOpt(order.order_kind)) {
        const key   = String(order.strike);
        const price = parseFloat(order.price ?? order.customer_price);
        const side  = order.side;
        if (key && side && !isNaN(price)) {
            if (!comboRestingOrders[key]) comboRestingOrders[key] = [];
            comboRestingOrders[key].push({ side, price, size: order.size, orderId });
        }
    }

    const row  = document.createElement("div");
    row.className    = "order-row";
    row.dataset.orderId = orderId;

    const text = document.createElement("span");
    text.innerText = audioMode ? `Trade ${++tradeCounter}` : order.sentence;

    const tradeBtn   = document.createElement("button");
    tradeBtn.innerText = "Trade Order";

    let intervalId = null;

    function clearTimer() {
        if (intervalId !== null) { clearInterval(intervalId); intervalId = null; }
        row.classList.remove("order-row-flashing");
    }

    tradeBtn.onclick = () => {
        clearTimer();
        const prefix = isSpread(order.order_kind) ? "SPREAD" : isOpt(order.order_kind) ? "OPT" : "COMBO";
        if (order.speak) addTapeEntry(`${prefix}: ` + order.speak, order.implied_stock);
        if (isOpt(order.order_kind)) {
            deregisterCellOrder(order);
        } else if (isSpread(order.order_kind)) {
            const reg = spreadRestingOrders[order.spread_label];
            if (reg) { const i = reg.findIndex(o => o.orderId === orderId); if (i !== -1) reg.splice(i, 1); }
        } else {
            const reg = comboRestingOrders[String(order.strike)];
            if (reg) { const i = reg.findIndex(o => o.orderId === orderId); if (i !== -1) reg.splice(i, 1); }
        }
        row.remove();
    };

    row.append(text, tradeBtn);

    let leaveBtn = null;
    if (decisionTime !== null) {
        leaveBtn = document.createElement("button");
        leaveBtn.innerText = "Leave Order";
        row.appendChild(leaveBtn);
    }

    if (order.speak && audioMode) {
        const speakBtn = document.createElement("button");
        speakBtn.innerText = "Speak again";
        speakBtn.onclick = () => speakIfEnabled("resting: " + order.speak);
        row.appendChild(speakBtn);
    }

    if (decisionTime !== null) {
        const timerSpan = document.createElement("span");
        timerSpan.className = "order-timer";
        timerSpan.innerText = "...";
        row.appendChild(timerSpan);

        let remaining   = decisionTime;
        let pollTimeout = null;

        const origClearTimer = clearTimer;
        function clearTimerFull() {
            if (pollTimeout !== null) { clearTimeout(pollTimeout); pollTimeout = null; }
            origClearTimer();
        }

        tradeBtn.onclick = () => {
            clearTimerFull();
            const prefix = isSpread(order.order_kind) ? "SPREAD" : isOpt(order.order_kind) ? "OPT" : "COMBO";
            if (order.speak) addTapeEntry(`${prefix}: ` + order.speak, order.implied_stock);
            if (isOpt(order.order_kind)) {
                deregisterCellOrder(order);
            } else if (isSpread(order.order_kind)) {
                const reg = spreadRestingOrders[order.spread_label];
                if (reg) { const i = reg.findIndex(o => o.orderId === orderId); if (i !== -1) reg.splice(i, 1); }
            } else {
                const reg = comboRestingOrders[String(order.strike)];
                if (reg) { const i = reg.findIndex(o => o.orderId === orderId); if (i !== -1) reg.splice(i, 1); }
            }
            row.remove();
        };

        function startCountdown() {
            timerSpan.innerText = `${remaining}s`;
            intervalId = setInterval(() => {
                remaining -= 1;
                timerSpan.innerText = `${remaining}s`;
                if (remaining <= 0) {
                    clearInterval(intervalId); intervalId = null;
                    row.classList.add("order-row-flashing");
                }
            }, 1000);
        }

        function pollUntilSpeechDone() {
            fetch("/speech_status")
                .then(r => r.json())
                .then(data => {
                    if (data.speaking) {
                        pollTimeout = setTimeout(pollUntilSpeechDone, 200);
                    } else {
                        pollTimeout = null;
                        startCountdown();
                    }
                })
                .catch(() => startCountdown());
        }

        pollUntilSpeechDone();

        leaveBtn.onclick = () => {
            clearTimerFull();
            leaveBtn.remove();
            timerSpan.remove();
        };
    }

    container.appendChild(row);
}

/* ================= CROSS AVOIDANCE ================= */

function adjustForCross(order) {
    const isOptions = isOpt(order.order_kind);
    const price = parseFloat(order.price ?? order.customer_price);
    const side  = order.side;
    if (!side || isNaN(price)) return false;

    const key      = isOptions ? order.option_label
                   : isSpread(order.order_kind) ? order.spread_label
                   : String(order.strike);
    const registry = isOptions ? (cellRestingOrders[key] || [])
                   : isSpread(order.order_kind) ? (spreadRestingOrders[key] || [])
                   : (comboRestingOrders[key] || []);

    let newPrice = null;
    if (side === "bid") {
        const offers = registry.filter(o => o.side === "offer");
        if (!offers.length) return false;
        const bestOffer = Math.min(...offers.map(o => o.price));
        if (price < bestOffer) return false;
        newPrice = parseFloat((bestOffer - 0.01).toFixed(2));
    } else {
        const bids = registry.filter(o => o.side === "bid");
        if (!bids.length) return false;
        const bestBid = Math.max(...bids.map(o => o.price));
        if (price > bestBid) return false;
        newPrice = parseFloat((bestBid + 0.01).toFixed(2));
    }

    if (newPrice <= 0) return "skip";

    const oldStr = price.toFixed(2);
    const newStr = newPrice.toFixed(2);
    if (order.price          !== undefined) order.price          = newPrice;
    if (order.customer_price !== undefined) order.customer_price = newPrice;
    if (order.sentence) order.sentence = order.sentence.replace(oldStr, newStr);
    if (order.speak)    order.speak    = order.speak.replace(oldStr, newStr);
    return true;
}

/* ================= DUPLICATE-ORDER SUPPRESSION ================= */

function shouldSuppressOrder(order) {
    const isOptions = isOpt(order.order_kind);
    const price     = parseFloat(order.price ?? order.customer_price);
    const side      = order.side;
    if (!side || isNaN(price)) return false;

    const key      = isOptions ? order.option_label
                   : isSpread(order.order_kind) ? order.spread_label
                   : String(order.strike);
    const registry = isOptions ? (cellRestingOrders[key] || [])
                   : isSpread(order.order_kind) ? (spreadRestingOrders[key] || [])
                   : (comboRestingOrders[key] || []);
    if (!registry.length) return false;

    const sameSide = registry.filter(o => o.side === side);
    if (!sameSide.length) return false;

    if (side === "bid") {
        const bestBid = Math.max(...sameSide.map(o => o.price));
        if (price > bestBid) return false;
    } else {
        const bestOffer = Math.min(...sameSide.map(o => o.price));
        if (price < bestOffer) return false;
    }
    return Math.random() < 0.85;
}

/* ================= BOARD CELL HELPERS (no-op when board is on /starting_info) ================= */

function updateBoardCellFromResting(order) {
    const label = order.option_label;
    if (!label) return;
    const price = parseFloat(order.price ?? order.customer_price);
    const side  = order.side;
    const size  = order.size;
    if (!side || isNaN(price) || !size) return;
    if (!cellRestingOrders[label]) cellRestingOrders[label] = [];
    cellRestingOrders[label].push({ side, price, size, orderId: order._orderId });
    // Board DOM lives on /starting_info; refreshCellFromOrders is a no-op here.
}

function deregisterCellOrder(order) {
    const label = order.option_label;
    if (!label || !cellRestingOrders[label]) return;
    const price = parseFloat(order.price ?? order.customer_price);
    const idx = cellRestingOrders[label].findIndex(
        o => o.side === order.side && Math.abs(o.price - price) < 0.001 && o.size === order.size
    );
    if (idx !== -1) cellRestingOrders[label].splice(idx, 1);
}

/* ================= GENERATE ORDER ================= */

function generateOrder() {
    fetch("/generate_order")
        .then(r => r.json())
        .then(order => {
            order._orderId = nextOrderId++;
            if (adjustForCross(order) === "skip") return;
            if (shouldSuppressOrder(order)) return;
            speakIfEnabled("order: " + order.speak);
            renderOrder(order);
        });
}

function generateOptionsOrder() {
    fetch("/generate_options_order")
        .then(r => r.json())
        .then(order => {
            order._orderId = nextOrderId++;
            if (adjustForCross(order) === "skip") return;
            if (shouldSuppressOrder(order)) return;
            speakIfEnabled("order: " + order.speak);
            updateBoardCellFromResting(order);
            renderOrder(order);
            detectAndEnqueueCompanion(order);
        });
}

function clampOtmToExistingBest(order) {
    const registry = cellRestingOrders[order.option_label] || [];
    let clampedPrice = null;
    if (order.side === "bid") {
        const existing = registry.filter(o => o.side === "bid");
        if (!existing.length) return;
        const bestBid = Math.max(...existing.map(o => o.price));
        if (parseFloat(order.customer_price) >= bestBid) return;
        clampedPrice = bestBid;
    } else {
        const existing = registry.filter(o => o.side === "offer");
        if (!existing.length) return;
        const bestOffer = Math.min(...existing.map(o => o.price));
        if (parseFloat(order.customer_price) <= bestOffer) return;
        clampedPrice = bestOffer;
    }
    const oldStr = parseFloat(order.customer_price).toFixed(2);
    const newStr = clampedPrice.toFixed(2);
    order.customer_price = clampedPrice;
    if (order.sentence) order.sentence = order.sentence.replace(oldStr, newStr);
    if (order.speak)    order.speak    = order.speak.replace(oldStr, newStr);
}

function generateOtmOrder() {
    fetch("/generate_otm_order")
        .then(r => r.json())
        .then(order => {
            order._orderId = nextOrderId++;
            clampOtmToExistingBest(order);
            if (adjustForCross(order) === "skip") return;
            if (shouldSuppressOrder(order)) return;
            speakIfEnabled("order: " + order.speak);
            updateBoardCellFromResting(order);
            renderOrder(order);
            detectAndEnqueueCompanion(order);
        });
}

function generateRandomOrder() {
    if (strategyLegs.length > 0) { fetchDirectedOptionOrder(strategyLegs.shift()); return; }
    const r = Math.random();
    if (r < 1/3) generateOrder();
    else if (r < 2/3) generateOptionsOrder();
    else generateMiddleOptionOrder();
}

function makeRandomMarket() {
    if (strategyLegs.length > 0) { makeDirectedOptionsMarket(strategyLegs.shift()); return; }
    const r = Math.random();
    if (r < 1/3) makeMarket();
    else if (r < 2/3) makeOptionsMarket();
    else makeMiddleOptionsMarket();
}

/* ================= STRATEGY ENGINE ================= */

function detectAndEnqueueCompanion(order) {
    if (!isOpt(order.order_kind)) return;
    if (strategyLegs.length > 0) return;
    if (Math.random() > 0.5) return;

    const label = order.option_label || "";
    const parts = label.split(" ");
    if (parts.length < 2) return;
    const S       = parseFloat(parts[0]);
    const optType = parts[1];
    const side    = order.side;
    const t       = tickSize;

    let candidates = [];
    if (side === "bid" && optType === "call") {
        candidates = [
            { strike: S + t,   option_type: "call", preferred_side: "offer" },
            { strike: S + 2*t, option_type: "call", preferred_side: "offer" },
            { strike: S - t,   option_type: "put",  preferred_side: "offer" },
            { strike: S - 2*t, option_type: "put",  preferred_side: "offer" },
        ];
    } else if (side === "offer" && optType === "call") {
        candidates = [
            { strike: S + t,   option_type: "call", preferred_side: "bid" },
            { strike: S + 2*t, option_type: "call", preferred_side: "bid" },
            { strike: S - t,   option_type: "put",  preferred_side: "bid" },
            { strike: S - 2*t, option_type: "put",  preferred_side: "bid" },
        ];
    } else if (side === "bid" && optType === "put") {
        candidates = [
            { strike: S - t,   option_type: "put",  preferred_side: "offer" },
            { strike: S - 2*t, option_type: "put",  preferred_side: "offer" },
            { strike: S + t,   option_type: "call", preferred_side: "offer" },
            { strike: S + 2*t, option_type: "call", preferred_side: "offer" },
        ];
    } else if (side === "offer" && optType === "put") {
        candidates = [
            { strike: S - t,   option_type: "put",  preferred_side: "bid" },
            { strike: S - 2*t, option_type: "put",  preferred_side: "bid" },
            { strike: S + t,   option_type: "call", preferred_side: "bid" },
            { strike: S + 2*t, option_type: "call", preferred_side: "bid" },
        ];
    }

    const valid = candidates.filter(c => isOnBoard(c.strike));
    if (!valid.length) return;
    strategyLegs.push(valid[Math.floor(Math.random() * valid.length)]);
}

function fetchDirectedOptionOrder(companion) {
    const url = `/generate_directed_option_order?strike=${companion.strike}`
              + `&option_type=${companion.option_type}`
              + `&preferred_side=${companion.preferred_side}`;
    fetch(url)
        .then(r => r.json())
        .then(order => {
            if (order.error) return;
            order._orderId = nextOrderId++;
            if (adjustForCross(order) === "skip") return;
            if (shouldSuppressOrder(order)) return;
            speakIfEnabled("order: " + order.speak);
            updateBoardCellFromResting(order);
            renderOrder(order);
            detectAndEnqueueCompanion(order);
        });
}

/* ================= ANY OPTIONS ================= */

function makeAnyOptionsMarket() {
    if (strategyLegs.length > 0) { makeDirectedOptionsMarket(strategyLegs.shift()); return; }
    if (Math.random() < 0.5) makeOptionsMarket();
    else makeMiddleOptionsMarket();
}

function generateAnyOptionsOrder() {
    if (strategyLegs.length > 0) { fetchDirectedOptionOrder(strategyLegs.shift()); return; }
    const r = Math.random();
    if (r < 1/3) generateOptionsOrder();
    else if (r < 2/3) generateOtmOrder();
    else generateMiddleOptionOrder();
}

/* ================= MAKE MARKET ================= */

function openMarketModal(order, title) {
    pendingMarket = order;
    const qw = document.getElementById("quoting-window");
    document.getElementById("quoting-title").textContent = title || "Make a market";
    document.getElementById("bid-input").value       = "";
    document.getElementById("offer-input").value     = "";
    document.getElementById("ref-fair-input").value  = "";
    document.getElementById("quoting-inputs").style.display = "";
    qw.classList.remove("quoting-window--idle", "quoting-window--flashing");
    qw.classList.add("quoting-window--active");
    document.getElementById("bid-input").focus();
    startModalTimer();
}

function makeMarket() {
    fetch("/make_market")
        .then(r => r.json())
        .then(order => {
            order.order_kind = "combo";
            speakIfEnabled("market: " + order.announce);
            openMarketModal(order, audioMode ? "" : `${order.size}x ${order.strike} combo`);
        });
}

function makeOptionsMarket() {
    fetch("/make_options_market")
        .then(r => r.json())
        .then(order => {
            speakIfEnabled("market: " + order.announce);
            openMarketModal(order, audioMode ? "" : `${order.size}x ${order.option_label}`);
        });
}

function makeMiddleOptionsMarket() {
    fetch("/make_middle_options_market")
        .then(r => r.json())
        .then(order => {

function generateSpreadOrder() {
    fetch("/generate_spread_order")
        .then(r => r.json())
        .then(order => {
            order._orderId = nextOrderId++;
            if (adjustForCross(order) === "skip") return;
            if (shouldSuppressOrder(order)) return;
            speakIfEnabled("order: " + order.speak);
            renderOrder(order);
        });
}

function makeDirectedOptionsMarket(companion) {
    const url = `/make_directed_options_market?strike=${companion.strike}`
              + `&option_type=${companion.option_type}`
              + `&preferred_side=${companion.preferred_side}`;
    fetch(url)
        .then(r => r.json())
        .then(order => {

            speakIfEnabled("market: " + order.announce);

function submitMarket() {
    clearModalTimer();
    const bid      = document.getElementById("bid-input").value;
    const offer    = document.getElementById("offer-input").value;
    const ref_fair = document.getElementById("ref-fair-input").value.trim() || null;
    const orderKind = pendingMarket.order_kind;
    const isOptions = orderKind === "options" || orderKind === "middle_options";
    const endpoint  = orderKind === "middle_options" ? "/submit_middle_options_market"
                    : orderKind === "options"        ? "/submit_options_market"
                    : orderKind === "spread"         ? "/submit_spread_market"
                    : "/submit_market";

    fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...pendingMarket, bid, offer, ref_fair })
    })
    .then(r => r.json())
    .then(result => {
        // Reset quoting window
        const qw = document.getElementById("quoting-window");
        qw.classList.remove("quoting-window--active", "quoting-window--flashing");
        qw.classList.add("quoting-window--idle");
        document.getElementById("quoting-title").textContent  = "No active market";
        document.getElementById("quoting-inputs").style.display = "none";

        if (result.type === "trade") {
            speakIfEnabled("trade: " + result.speak);
            const sideWord   = result.side === "bid" ? "sold" : "bought";
            const dispPrice  = result.ref_fair != null
                ? `${parseFloat(result.quoted_price).toFixed(2)} ref ${parseFloat(result.ref_fair).toFixed(2)}`
                : parseFloat(result.price).toFixed(2);
            if (isOptions) {
                addTapeEntry(`OPT: Customer ${sideWord} ${result.size}x ${result.option_label} @ ${dispPrice}`, result.implied_stock);
            } else if (isSpread(result.order_kind) || result.spread_label) {
                addTapeEntry(`SPREAD: Customer ${sideWord} ${result.size}x ${result.spread_label} @ ${dispPrice}`, result.implied_stock);
            } else {
                addTapeEntry(`COMBO: Customer ${sideWord} ${result.size}x ${result.strike} combo @ ${dispPrice}`, result.implied_stock);
            }
            return;
        }

        result._orderId = nextOrderId++;
        if (adjustForCross(result) === "skip") return;
        speakIfEnabled("resting: " + result.speak);
        if (isOptions) updateBoardCellFromResting(result);
        renderOrder(result);
        if (isOptions) detectAndEnqueueCompanion(result);
    });
}
